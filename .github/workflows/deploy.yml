name: Docker Image CI

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "headscale/**"

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: headscale
  ECS_CLUSTER: headscale-cluster
  ECS_SERVICE: headscale-service

# OIDC token generation
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # Set up Credentials for AWS with OIDC Role assumption
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to AWS ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $AWS_REGION

  post-deploy-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service to be reachable
        run: |
          for i in {1..10}; do
            curl -s https://headscale.ska-cloud.uk/health && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Health check
        run: |
          curl --fail https://headscale.ska-cloud.uk/health
          echo "Post-deploy health check passed!"
