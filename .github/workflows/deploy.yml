name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "headscale/**"

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: headscale
  ECS_CLUSTER: headscale-cluster
  ECS_SERVICE: headscale-service
  TF_VAR_image_tag: ${{ github.sha }}

# OIDC token generation
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # Set up Credentials for AWS with OIDC Role assumption
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy new task definition to ECS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          TASK_FAMILY: headscale-task
        run: |
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --region $AWS_REGION \
            --query 'taskDefinition' > task-def.json

          NEW_TASK_DEF=$(jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-def.json)

          NEW_REVISION=$(aws ecs register-task-definition \
            --region $AWS_REGION \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.revision' --output text)

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$TASK_FAMILY:$NEW_REVISION" \
            --region $AWS_REGION

  post-deploy-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service to be reachable
        run: |
          for i in {1..10}; do
            curl -s https://headscale.ska-cloud.uk/health && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Health check
        run: |
          curl --fail https://headscale.ska-cloud.uk/health
          echo "Post-deploy health check passed!"
