name: Health Check

on:
  # Once the pipeline is stable, change `push` to `pull_request`
  pull_request:
    paths:
      - "Dockerfile"
      - "headscale/**"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build image
        run: docker build -t headscale:test .

      - name: Create config
        run: |
          mkdir -p /tmp/headscale
          cp ${{ github.workspace }}/headscale/config-example.yaml /tmp/headscale/config.yaml
          sed -i 's/127.0.0.1:8080/0.0.0.0:8080/' /tmp/headscale/config.yaml

      - name: Run container
        run: |
          docker run -d --name headscale-test \
            -p 8080:8080 \
            -v /tmp/headscale/config.yaml:/etc/headscale/config.yaml \
            headscale:test

      - name: Container logs
        if: always()
        run: docker logs headscale-test

      - name: Health check
        run: |
          curl --fail http://localhost:8080/health
          echo "Health check passed!"
