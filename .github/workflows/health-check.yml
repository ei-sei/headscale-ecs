name: Health Check

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "headscale/**"
      - "config.production.yaml"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build image
        run: docker build -t headscale:test .

      - name: Run container
        run: docker run -d --name headscale-test -p 8080:8080 headscale:test

      - name: Wait for container
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8080/health && break
            echo "Attempt $i failed, retrying..."
            sleep 3
          done

      - name: Health check
        run: |
          curl --fail http://localhost:8080/health
          echo "Health check passed!"
